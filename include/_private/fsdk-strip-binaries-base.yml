variables:
  strip-binaries-base: |
    OPTS=()
    if ! "%{optimize-debug}"; then
      OPTS+=("-n")
    fi
    if ! "%{compress-debug}"; then
      OPTS+=("-p")
    fi
    for p in %{toolchain-prefixes}; do
      OPTS+=("-t" "${p}")
    done
    freedesktop-sdk-stripper \
        "${OPTS[@]}" \
        "%{build-root}" \
        "%{sourcedir}/%{stripdir-suffix}" \
        "%{debugdatadir}/dwz/%{stripdir-suffix}" \
        "%{debugdir}" \
        "%{install-root}"
