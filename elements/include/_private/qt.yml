build-depends:
- freedesktop-sdk.bst:public-stacks/buildsystem-cmake.bst
- components/_private/python3-spdx-tools.bst

depends: []

variables:
  qt-element-name: unknown
  qt-api-version: "6.10"
  qt-version: "6.10.3"

  license-element-name: "qt%{qt-element-name}"
  # NOTE: This is similar to what KDE does for their runtime
  license-files-final: "LICENSES/*.txt"

  qt-bindir: "%{bindir}"
  qt-includedir: "%{includedir}/qt"
  qt-libdir: "%{libdir}"
  # TODO(Qt 6.11): qt-cmakedir: "%{qt-libdir}/cmake"
  qt-mkspecsdir: "%{libdir}/qt/mkspecs"
  qt-sharedir: "%{datadir}"
  qt-qt-sharedir: "%{qt-sharedir}/qt"
  qt-archdatadir: "%{libdir}/qt"
  qt-pluginsdir: "%{qt-archdatadir}/plugins"
  qt-libexecdir: "%{libexecdir}/qt"
  qt-qmldir: "%{qt-archdatadir}/qml"
  qt-datadir: "%{datadir}/qt"
  qt-docdir: "%{qt-datadir}/doc"
  qt-translationsdir: "%{qt-datadir}/translations"
  qt-sysconfdir: "%{sysconfdir}/xdg"
  qt-examplesdir: "%{datadir}/qt/examples"
  qt-testsdir: "%{datadir}/qt/tests"
  qt-descriptionsdir: "%{qt-archdatadir}/modules"
  qt-sbomdir: "%{sbomdir}"

public:
  bst:
    split-rules:
      doc:
        (>):
        - "%{qt-docdir}"
        - "%{qt-docdir}/**"

  cpe:
    product: "qt%{qt-element-name}"
    vendor: "TheQtCompany"
    version: "%{qt-version}"
