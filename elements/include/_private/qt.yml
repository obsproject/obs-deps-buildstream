build-depends:
- freedesktop-sdk.bst:public-stacks/buildsystem-cmake.bst
- components/_private/python3-spdx-tools.bst

depends: []

variables:
  qt-element-name: unknown
  qt-api-version: "6.10"
  qt-version: "6.10.3"

  license-element-name: "qt%{qt-element-name}"
  # NOTE: This is similar to what KDE does for their runtime
  license-files-final: "LICENSES/*.txt"

  qt-bindir: "%{bindir}"
  qt-includedir: "%{includedir}/qt"
  qt-libdir: "%{libdir}"
  # TODO(Qt 6.11): qt-cmakedir: "%{qt-libdir}/cmake"
  qt-mkspecsdir: "%{libdir}/qt/mkspecs"
  qt-sharedir: "%{datadir}"
  qt-qt-sharedir: "%{qt-sharedir}/qt"
  qt-archdatadir: "%{libdir}/qt"
  qt-pluginsdir: "%{qt-archdatadir}/plugins"
  qt-libexecdir: "%{libexecdir}/qt"
  qt-qmldir: "%{qt-archdatadir}/qml"
  qt-datadir: "%{datadir}/qt"
  qt-docdir: "%{qt-datadir}/doc"
  qt-translationsdir: "%{qt-datadir}/translations"
  qt-sysconfdir: "%{sysconfdir}/xdg"
  qt-examplesdir: "%{datadir}/qt/examples"
  qt-testsdir: "%{datadir}/qt/tests"
  qt-descriptionsdir: "%{qt-archdatadir}/modules"
  qt-sbomdir: "%{sbomdir}"

public:
  bst:
    split-rules:
      runtime:
        - "%{qt-libdir}/lib*.so*"
        - "%{qt-pluginsdir}"
        - "%{qt-pluginsdir}/**"
      devel:
        # Binaries and executables
        - "%{qt-bindir}"
        - "%{qt-bindir}/**"
        - "%{qt-libexecdir}"
        - "%{qt-libexecdir}/**"
        - "%{qt-libdir}/lib*.a"
        # Other files
        - "%{qt-includedir}"
        - "%{qt-includedir}/**"
        - "%{qt-libdir}/*.prl"
        # TODO(Qt 6.11): Replace with qt-cmakedir
        - "%{qt-libdir}/cmake"
        - "%{qt-libdir}/cmake/**"
        - "%{qt-libdir}/pkgconfig"
        - "%{qt-libdir}/pkgconfig/**"
        - "%{qt-mkspecsdir}"
        - "%{qt-mkspecsdir}/**"
        - "%{qt-descriptionsdir}"
        - "%{qt-descriptionsdir}/**"
        - "%{qt-archdatadir}/metatypes"
        - "%{qt-archdatadir}/metatypes/**"
        - "%{qt-qt-sharedir}/wayland"
        - "%{qt-qt-sharedir}/wayland/**"
      doc:
        - "%{qt-docdir}"
        - "%{qt-docdir}/**"
      # NOTE: qmake and extra rules could be improve with the help of cmake/QtMkspecHelpers.cmake
      extra:
        - "%{qt-mkspecsdir}/devices"
        - "%{qt-mkspecsdir}/devices/**"
        - "%{qt-mkspecsdir}/unsupported"
        - "%{qt-mkspecsdir}/unsupported/**"
        # Pass non-posix common
        - "%{qt-mkspecsdir}/common/[!p]*"
        - "%{qt-mkspecsdir}/common/[!p]*/**"
        # Pass non-linux except lynxos
        - "%{qt-mkspecsdir}/[!l]*-*"
        - "%{qt-mkspecsdir}/[!l]*-*/**"
        # Pass lynxos
        - "%{qt-mkspecsdir}/lynxos-*"
        - "%{qt-mkspecsdir}/lynxos-*/**"
        # Pass linux with more than a compiler suffix
        - "%{qt-mkspecsdir}/linux-*-*"
        - "%{qt-mkspecsdir}/linux-*-*/**"
        # Pass non-g++ and non-clang
        - "%{qt-mkspecsdir}/linux-[!gc]*"
        - "%{qt-mkspecsdir}/linux-[!gc]*/**"
      sbom:
        - "%{qt-sbomdir}"
        - "%{qt-sbomdir}/*"
      qmake:
        - "%{qt-bindir}/qmake"
        - "%{qt-libdir}/*.prl"
        - "%{qt-mkspecsdir}/*.pri"
        - "%{qt-mkspecsdir}/**/*.conf"
        - "%{qt-mkspecsdir}/dummy"
        - "%{qt-mkspecsdir}/dummy/**"
        - "%{qt-mkspecsdir}/features"
        - "%{qt-mkspecsdir}/features/**"
        - "%{qt-mkspecsdir}/modules"
        - "%{qt-mkspecsdir}/modules/**"
      obs-unneeded:
        # Vendored Wayland protocol XMLs are not needed
        - "%{qt-qt-sharedir}/wayland"
        - "%{qt-qt-sharedir}/wayland/**"

  cpe:
    product: "qt%{qt-element-name}"
    vendor: "TheQtCompany"
    version: "%{qt-version}"
