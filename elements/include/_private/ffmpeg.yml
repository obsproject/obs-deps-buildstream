build-depends:
- freedesktop-sdk.bst:components/nasm.bst
- freedesktop-sdk.bst:components/vulkan-headers.bst
- freedesktop-sdk.bst:public-stacks/buildsystem-autotools.bst

(?):
- target_arch in ["x86_64", "i686", "aarch64", "ppc64le"]:
    build-depends:
      (>):
      - freedesktop-sdk.bst:components/nv-codec-headers.bst

variables:
  optimize-debug: "false"
  arch-conf: ''
  ffmpeg-arch: '%{arch}'
  (?):
  - target_arch == "i686":
      ffmpeg-arch: x86
  - target_arch in ["x86_64", "i686", "aarch64", "ppc64le"]:
      arch-conf: >-
        --enable-ffnvcodec

  conf-local: >-
    --prefix="%{prefix}"
    --libdir="%{libdir}"
    --optflags="${CFLAGS}"
    --extra-ldflags="${LDFLAGS}"
    --disable-stripping
    --disable-doc
    --disable-static
    --disable-encoders
    --disable-decoders
    --enable-shared
    --enable-gnutls
    --enable-gcrypt
    --enable-ladspa
    --enable-lcms2
    --enable-libaom
    --enable-libdav1d
    --enable-libmp3lame
    --enable-libfontconfig
    --enable-libfreetype
    --enable-libfribidi
    --enable-libjxl
    --enable-libopus
    --enable-libpulse
    --enable-libspeex
    --enable-libtheora
    --enable-libvorbis
    --enable-libvpx
    --enable-librsvg
    --enable-libwebp
    --enable-libxml2
    --enable-libopenjpeg
    --enable-libsvtav1
    --enable-openal
    --enable-opengl
    --enable-sdl2
    --enable-vulkan
    --enable-zlib
    --enable-libv4l2
    --enable-libxcb
    --enable-vdpau
    --enable-vaapi
    --enable-pthreads
    --enable-libmysofa
    --arch="%{ffmpeg-arch}"

  conf-extra: ''

# ffmpeg is not using autotools, but a configure and Makefile files
config:
  configure-commands:
  - ./configure %{conf-local} %{conf-extra} %{arch-conf}

